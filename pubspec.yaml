name: wasal
description: "A Taxi client app for booking rides within local governorates."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.4.1

  # Networking
  dio: ^5.9.2
  retrofit: ^4.9.2
  pretty_dio_logger: ^1.4.0

  # Maps
  google_maps_flutter: ^2.17.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_polyline_points: ^3.1.0

  # Notifications & Firebase
  firebase_core: ^4.8.0
  firebase_messaging: ^16.2.1

  # Models & Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.2.0
  cached_network_image: ^3.4.1

  # UI
  flutter_screenutil: ^5.9.3
  shimmer: ^3.0.0
  flutter_svg: ^2.3.0
  flutter_rating_bar: ^4.0.1
  pinput: ^6.0.2

  # Routing
  go_router: ^17.2.3

  # Localization
  easy_localization: ^3.0.8
  intl: ^0.20.2

  # Permissions
  permission_handler: ^12.0.1

  # Utils
  connectivity_plus: ^7.1.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  riverpod_generator: ^2.6.3
  retrofit_generator: ^9.7.0
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true
